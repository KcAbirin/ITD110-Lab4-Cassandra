<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDG 4 - Cohort Survival Rate</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="header-content">
        <div class="sdg-badge">SDG 4</div>
        <div>
            <h1>Philippine Cohort Survival Rate</h1>
            <p class="subtitle">
                Sustainable Development Goal 4 — Quality Education
            </p>
            </div>
    </div>
</header>

<div class="container">

<section class="section">
    <h2>Import Dataset</h2>

    <div class="import-row">
        <input type="file" id="csv-file" accept=".csv">
        <button id="import-btn" class="btn btn-import">
            Import CSV
        </button>
    </div>

    <p id="import-status" class="status hidden"></p>
</section>

<section class="section">
    <h2>Education Dataset</h2>

    <div class="section-row">
        <div class="filter-row">
            <label>Filter by Location</label>
            <select id="location-select">
                <option value="">All Locations</option>
            </select>
            <label>Sort by Year</label>
            <select id="sort-select">
                <option value="none">None</option>
                <option value="asc">Ascending</option>
                <option value="desc">Descending</option>
            </select>
        </div>
        <p id="dataset-status" class="status hidden"></p>
    </div>

    <div class="data-grid">
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Location</th>
                        <th>Year</th>
                        <th>Education Level</th>
                        <th>Sex</th>
                        <th>Survival Rate</th>
                    </tr>
                </thead>
                <tbody id="data-tbody"></tbody>
            </table>
        </div>

        <aside class="edit-panel">
            <div class="edit-header">
                <h3>Edit Dataset</h3>
                <p>Select a row from the table to load values, then update or delete it. You can also add a new record.</p>
            </div>

            <form id="edit-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="geolocation-input">Location</label>
                        <input type="text" id="geolocation-input" list="location-datalist">
                        <datalist id="location-datalist"></datalist>
                    </div>
                    <div class="form-group">
                        <label for="year-input">Year</label>
                        <input type="number" id="year-input" min="1900" max="2100">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="education-level-input">Education Level</label>
                        <input type="text" id="education-level-input" >
                    </div>
                    <div class="form-group">
                        <label for="sex-input">Sex</label>
                        <select id="sex-input">
                            <option value="Both Sexes">Both Sexes</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="indicator-input">Indicator</label>
                        <input type="text" id="indicator-input" placeholder="Indicator" value="Cohort Survival Rate">
                    </div>
                    <div class="form-group">
                        <label for="survival-rate-input">Survival Rate</label>
                        <input type="number" id="survival-rate-input" step="0.1">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="create-btn" class="btn btn-primary">Add</button>
                    <button type="button" id="update-btn" class="btn btn-secondary">Update</button>
                    <button type="button" id="delete-btn" class="btn btn-delete">Delete</button>
                    <button type="button" id="clear-btn" class="btn btn-secondary">Clear</button>
                </div>
            </form>
        </aside>
    </div>
</section>

</div>

<script src="js/app.js"></script>
</body>
</html>
